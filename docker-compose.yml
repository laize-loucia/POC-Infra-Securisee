
#instructions pour gérer les conteneurs :

version: "3.8"

services:

  web:
    image: nginx:alpine
    container_name: web_server
    ports:
      - "8080:80"
    networks:
      - dmz_net

  ldap:
    image: osixia/openldap:1.5.0
    container_name: ldap_server
    environment:
      LDAP_ORGANISATION: "Lab"
      LDAP_DOMAIN: "lab.local"
      LDAP_ADMIN_PASSWORD: "admin"
    networks:
      - internal_net

networks:
  dmz_net:
    driver: bridge

  internal_net:
    driver: bridge
